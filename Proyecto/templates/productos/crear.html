{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm mx-auto" style="max-width: 500px;">
        <div class="card-header text-white" style="background-color: #0a2b5c;">
            <h4 class="mb-0">Registrar Medicamento</h4>
        </div>
        <div class="card-body">
            <form action="{{ url_for('crear_producto') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Nombre del Medicamento</label>
                    <input type="text" name="nombre" class="form-control" required placeholder="Ej: Paracetamol">
                </div>
                <div class="mb-3">
                    <label class="form-label">Precio ($)</label>
                    <input type="number" step="0.01" name="precio" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Stock inicial</label>
                    <input type="number" name="stock" class="form-control" required>
                </div>
                <button type="submit" class="btn w-100 text-white" style="background-color: #0a2b5c;">Guardar Medicamento</button>
                <a href="{{ url_for('productos') }}" class="btn btn-light w-100 mt-2 border">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
