{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm mx-auto" style="max-width: 500px;">
        <div class="card-header bg-warning text-dark">
            <h4 class="mb-0">Editar Medicamento</h4>
        </div>
        <div class="card-body">
            <form action="{{ url_for('editar_producto', id=producto.medicamento_id) }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Precio ($)</label>
                    <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto.precio }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Stock</label>
                    <input type="number" name="stock" class="form-control" value="{{ producto.stock }}" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Actualizar Cambios</button>
                <a href="{{ url_for('productos') }}" class="btn btn-light w-100 mt-2 border">Volver</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
