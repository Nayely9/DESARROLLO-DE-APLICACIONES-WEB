{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 style="color: #0a2b5c;">Inventario</h2>
        <a href="{{ url_for('crear_producto') }}" class="btn btn-success">Añadir Nuevo</a>
    </div>

    <div class="mb-3">
        <a href="{{ url_for('productos_json') }}" class="btn btn-dark btn-sm shadow-sm">JSON</a>
        <a href="{{ url_for('productos_csv') }}" class="btn btn-dark btn-sm shadow-sm">CSV</a>
        <a href="{{ url_for('productos_txt') }}" class="btn btn-dark btn-sm shadow-sm">TXT</a>
        <a href="{{ url_for('productos_pdf') }}" class="btn btn-danger btn-sm shadow-sm">PDF</a>
    </div>

    <table class="table table-hover border">
        <thead class="bg-light">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th class="text-center">Acciones</th>
            </tr>
        </thead>
      <tbody>
    {% for p in productos %}
    <tr>
        <td>{{ loop.index }}</td> 
        <td>{{ p.nombre }}</td>
        <td>${{ p.precio }}</td>
        <td>{{ p.stock }}</td>
        <td class="text-center">
            <a href="{{ url_for('editar_producto', id=p.medicamento_id) }}" class="btn btn-warning btn-sm">Editar</a>
            <a href="{{ url_for('eliminar_producto_ruta', id=p.medicamento_id) }}" class="btn btn-danger btn-sm">Eliminar</a>
        </td>
    </tr>
    {% endfor %}
      </tbody>
    </table>
</div>
{% endblock %}
