{% extends "base.html" %}

{% block content %}

<h2>Registro de Usuario</h2>

<form method="POST">

<label>Nombre</label>
<input type="text" name="nombre" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Contraseña</label>
<input type="password" name="password" required>

<button type="submit">Registrar</button>

</form>

{% endblock %}
