{% extends "base.html" %}

{% block content %}

<h2>Usuarios (MySQL)</h2>

<a href="/agregar_usuario">Agregar Usuario</a>

<br><br>

<table border="1">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Email</th>
</tr>

{% for u in usuarios %}
<tr>
<td>{{u.id_usuario}}</td>
<td>{{u.nombre}}</td>
<td>{{u.mail}}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
