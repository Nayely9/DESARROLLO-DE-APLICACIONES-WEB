{% extends "base.html" %}

{% block content %}

<h2>Usuarios</h2>

<table class="table table-striped">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Email</th>
</tr>

{% for u in usuarios %}
<tr>
<td>{{ u.id_usuario }}</td>
<td>{{ u.nombre }}</td>
<td>{{ u.email }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
